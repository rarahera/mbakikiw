<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bunga Untuk Kamu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- PAGE 1 -->
  <div class="page active" id="page1">
    <h1>hei kamu 🌸</h1>
    <p>aku punya sesuatu buat kamu...</p>
    <button id="btnMulai">lihat</button>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page2">
    <h1>tunggu ya...</h1>
    <p>lagi aku siapin sesuatu 🌱</p>
    <button id="btnTumbuh">lanjut</button>
  </div>

  <!-- PAGE 3 -->
  <div class="page" id="page3">
    <h1>bunganya lagi tumbuh 🌱</h1>

    <div class="plant">
      🌱
    </div>

    <div class="loading-bar">
      <div class="fill"></div>
    </div>

    <p id="loadingText">tumbuh pelan-pelan...</p>
  </div>

  <!-- PAGE 4 -->
  <div class="page" id="page4">
    <h1>WAAAH MEKAR 🌸✨</h1>

    <div class="bouquet">
      💐
    </div>

    <p class="text">nih bunga...</p>
    <p class="text highlight">biar gak lupa sama aku 🥺</p>

    <button onclick="alert('jangan lupa bahagia ya 🌸')">
      klik ini terakhir
    </button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
